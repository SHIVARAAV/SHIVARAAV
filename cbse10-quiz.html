<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Class 10 Quiz - SHIVARAAV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; }
        body { 
            background-image: url('1000061464.jpg'); background-size: cover; background-attachment: fixed; background-position: center; 
            color: white; text-align: center; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
        }

        /* --- LOADER SYSTEM --- */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-wrapper { position: relative; width: 120px; height: 120px; }
        .spinner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 4px solid rgba(255, 215, 0, 0.1); border-top: 4px solid var(--gold);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        .loader-logo { position: absolute; top: 10px; left: 10px; width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- QUIZ WINDOW --- */
        #quiz-window {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 15, 0.98); z-index: 9999; display: none; overflow-y: auto; padding: 20px;
        }
        .quiz-card {
            max-width: 700px; margin: 40px auto; background: rgba(255,255,255,0.05);
            border: 2px solid var(--gold); border-radius: 20px; padding: 30px; backdrop-filter: blur(15px);
        }
        .quiz-stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: var(--gold); border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
        
        .option-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: transparent; color: white; border: 1px solid var(--gold);
            border-radius: 10px; cursor: pointer; text-align: left; font-size: 1.1rem;
        }
        .correct { background-color: #28a745 !important; border-color: #28a745 !important; }
        .wrong { background-color: #dc3545 !important; border-color: #dc3545 !important; }

        /* --- MAIN UI --- */
        .header-section { padding: 30px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,215,0,0.2); }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: rgba(0, 15, 25, 0.8); border-radius: 12px; border: 1px solid rgba(255, 215, 0, 0.3); overflow: hidden; margin-bottom: 10px; }
        .card-header { background: linear-gradient(45deg, #003366, #004080); color: var(--gold); padding: 12px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,215,0,0.1); text-align: left; font-size: 14px; }
        .btn-start { cursor: pointer; background: var(--gold); color: black; padding: 6px 18px; border-radius: 15px; font-weight: bold; border: none; font-size: 12px; }
    </style>
</head>
<body>

<div id="loader-overlay">
    <div class="loader-wrapper">
        <div class="spinner"></div>
        <img src="alogogg.jpeg" class="loader-logo">
    </div>
    <p style="color: var(--gold); margin-top: 25px; font-weight: bold; font-size: 1.2rem;">SHIVARAAV QUIZ LOADING...</p>
</div>

<div id="quiz-window">
    <div class="quiz-card">
        <div class="quiz-stats">
            <span><i class="fas fa-clock"></i> <span id="timer">10:00</span></span>
            <span id="progress">Q: 0/0</span>
            <span><i class="fas fa-check" style="color:#28a745"></i> <span id="c-count">0</span> | <i class="fas fa-times" style="color:#dc3545"></i> <span id="w-count">0</span></span>
        </div>
        <h3 id="q-text" style="min-height: 70px;"></h3>
        <div id="opt-box"></div>
        <div id="res-box" style="display:none; margin-top: 20px;">
            <h2 style="color:var(--gold)">टेस्ट पूरा हुआ!</h2>
            <button onclick="location.reload()" class="btn-start" style="padding:10px 30px; font-size: 18px;">Main Menu</button>
        </div>
    </div>
</div>

<div class="header-section">
    <img src="1000061253.webp" style="height: 80px;">
    <h1 style="color:var(--gold); font-weight: 800;">SHIVARAAV EDUCATION</h1>
</div>

<div class="container">
    <div class="subject-grid">
        <div class="card"><div class="card-header">SCIENCE (Quiz)</div>
            <table>
                <tr><td>Physics Chapter 1</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch1')" class="btn-start">Start</button></td></tr>
                <tr><td>Physics Chapter 2</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch2')" class="btn-start">Start</button></td></tr>
            </table>
        </div>
        
        <div class="card"><div class="card-header">MATHEMATICS (Quiz)</div>
            <table>
                <tr><td>Chapter 1</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch1')" class="btn-start">Start</button></td></tr>
            </table>
        </div>
        
        <div class="card"><div class="card-header">SOCIAL SCIENCE</div>
            <table>
                <tr><td>History Chapter 1</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch1')" class="btn-start">Start</button></td></tr>
            </table>
        </div>
    </div>
</div>

<script>
    const S_ID = '1Wo4kZzOhXWszWn3Qq-65VqAe1UDi_j4f6SbrPk4Ueo0';
    let qList = [], cur = 0, correct = 0, wrong = 0, timerVal;

    async function startMyQuiz(tName) {
        // Show Loader first
        document.getElementById('loader-overlay').style.display = 'flex';
        
        const url = https://docs.google.com/spreadsheets/d/${S_ID}/gviz/tq?tqx=out:json&sheet=${tName};
        
        try {
            const response = await fetch(url);
            const text = await response.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            
            qList = json.table.rows.slice(1).map(r => ({
                q: r.c[0]?.v,
                o: [r.c[1]?.v, r.c[2]?.v, r.c[3]?.v, r.c[4]?.v],
                a: parseInt(r.c[5]?.v) - 1
            }));

            if(qList.length > 0) {
                // Hide loader and show quiz window
                document.getElementById('loader-overlay').style.display = 'none';
                document.getElementById('quiz-window').style.display = 'block';
                beginTimer();
                renderQ();
            }
        } catch (e) {
            document.getElementById('loader-overlay').style.display = 'none';
            alert("डेटा लोड नहीं हो पाया! कृपया अपनी Google Sheet में 'Publish to Web' चेक करें।");
        }
    }

    function beginTimer() {
        let t = 600;
        timerVal = setInterval(() => {
            let m = Math.floor(t / 60);
            let s = t % 60;
            document.getElementById('timer').innerText = ${m}:${s < 10 ? '0' : ''}${s};
            if(t <= 0) finish();
            t--;
        }, 1000);
    }

    function renderQ() {
        const data = qList[cur];
        document.getElementById('progress').innerText = सवाल: ${cur + 1}/${qList.length};
        document.getElementById('q-text').innerText = data.q;
        const box = document.getElementById('opt-box');
        box.innerHTML = '';
        
        data.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => check(btn, i);
            box.appendChild(btn);
        });
    }

    function check(btn, i) {
        const ans = qList[cur].a;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        if(i === ans) {
            btn.classList.add('correct');
            correct++;
            document.getElementById('c-count').innerText = correct;
        } else {
            btn.classList.add('wrong');
            btns[ans].classList.add('correct');
            wrong++;
            document.getElementById('w-count').innerText = wrong;
        }

        setTimeout(() => {
            cur++;
            if(cur < qList.length) renderQ();
            else finish();
        }, 1300);
    }

    function finish() {
        clearInterval(timerVal);
        document.getElementById('q-text').innerText = स्कोर: ${correct}/${qList.length};
        document.getElementById('opt-box').innerHTML = '';
        document.getElementById('res-box').style.display = 'block';
    }
</script>

</body>
</html>
