<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Class 10 Quiz - SHIVARAAV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; }
        body { 
            background-image: url('1000061464.jpg'); 
            background-size: cover; background-attachment: fixed; background-position: center; 
            color: white; text-align: center; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
        }

        /* --- QUIZ OVERLAY WINDOW --- */
        #quiz-window {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 12, 20, 0.98); z-index: 9999; display: none; overflow-y: auto; padding: 20px;
        }
        .quiz-card {
            max-width: 700px; margin: 40px auto; background: rgba(255,255,255,0.05);
            border: 2px solid var(--gold); border-radius: 20px; padding: 30px; backdrop-filter: blur(15px);
        }
        .quiz-stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: var(--gold); border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
        
        .option-btn {
            display: block; width: 100%; padding: 15px; margin: 10px 0;
            background: transparent; color: white; border: 1px solid var(--gold);
            border-radius: 10px; cursor: pointer; transition: 0.3s; text-align: left; font-size: 1rem;
        }
        .correct { background-color: #28a745 !important; border-color: #28a745 !important; }
        .wrong { background-color: #dc3545 !important; border-color: #dc3545 !important; }

        /* --- LOADER --- */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 10000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-wrapper { position: relative; width: 150px; height: 150px; }
        .spinner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 4px solid rgba(255, 215, 0, 0.1); border-top: 4px solid var(--gold);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        .loader-logo { position: absolute; top: 15px; left: 15px; width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }

        /* --- UI ELEMENTS --- */
        .header-section { padding: 30px; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); border-bottom: 1px solid rgba(255,215,0,0.2); }
        .logo { height: 90px; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .breadcrumb { font-size: 26px; font-weight: 900; color: var(--gold); margin: 20px 0; text-align: left; border-left: 6px solid var(--gold); padding-left: 15px; }
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: rgba(0, 15, 25, 0.8); border-radius: 12px; border: 1px solid rgba(255, 215, 0, 0.3); overflow: hidden; margin-bottom: 10px; }
        .card-header { background: linear-gradient(45deg, #003366, #004080); color: var(--gold); padding: 12px; font-weight: bold; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px; border-bottom: 1px solid rgba(255,215,0,0.1); font-size: 14px; text-align: left; padding-left: 15px; }
        .btn-start { cursor: pointer; background: var(--gold); color: black; padding: 5px 15px; border-radius: 15px; font-weight: bold; border: none; font-size: 12px; }
    </style>
</head>
<body>

<div id="quiz-window">
    <div class="quiz-card">
        <div class="quiz-stats">
            <span><i class="fas fa-clock"></i> <span id="timer">10:00</span></span>
            <span id="progress">Q: 0/0</span>
            <span><i class="fas fa-check"></i> <span id="correct-count">0</span> | <i class="fas fa-times"></i> <span id="wrong-count">0</span></span>
        </div>
        <h3 id="quiz-question" style="margin-bottom: 25px; line-height: 1.5;">लोड हो रहा है...</h3>
        <div id="options-box"></div>
        <div id="result-box" style="display:none; margin-top: 20px;">
            <h2 style="color:var(--gold)">टेस्ट पूरा हुआ!</h2>
            <button onclick="location.reload()" class="btn-start" style="padding:10px 20px; font-size: 16px;">Main Menu</button>
        </div>
    </div>
</div>

<div id="loader-overlay">
    <div class="loader-wrapper">
        <div class="spinner"></div>
        <img src="alogogg.jpeg" class="loader-logo">
    </div>
    <p style="color: var(--gold); margin-top: 25px; font-weight: bold;">LOADING QUIZ...</p>
</div>

<div class="header-section">
    <img src="1000061253.webp" alt="Logo" class="logo">
    <h1 style="color:var(--gold); margin:10px 0; font-weight: 800;">SHIVARAAV EDUCATION</h1>
</div>

<div class="container">
    <div class="breadcrumb">CBSE CLASS 10TH QUIZ</div>

    <div class="subject-grid">
        <div class="card"><div class="card-header">MATHEMATICS</div>
            <table>
                <tr><td>Chapter 1: Online Test</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch1')" class="btn-start">Start</button></td></tr>
                <tr><td>Chapter 2: Online Test</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch2')" class="btn-start">Start</button></td></tr>
            </table>
        </div>

        <div class="card"><div class="card-header">SCIENCE</div>
            <table>
                <tr><td>Chapter 1: Online Test</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch1')" class="btn-start">Start</button></td></tr>
                <tr><td>Chapter 2: Online Test</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch2')" class="btn-start">Start</button></td></tr>
            </table>
        </div>

        <div class="card"><div class="card-header">SST - HISTORY</div>
            <table>
                <tr><td>Chapter 1: Quiz</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch1')" class="btn-start">Start</button></td></tr>
                <tr><td>Chapter 2: Quiz</td><td align="right"><button onclick="startMyQuiz('cbse_10_physics_ch2')" class="btn-start">Start</button></td></tr>
            </table>
        </div>

        </div>
</div>

<script>
    const MY_SHEET_ID = '1Wo4kZzOhXWszWn3Qq-65VqAe1UDi_j4f6SbrPk4Ueo0';
    let qArray = [], currentIdx = 0, cCount = 0, wCount = 0, quizTimer;

    async function startMyQuiz(sheetName) {
        document.getElementById('loader-overlay').style.display = 'flex';
        const url = https://docs.google.com/spreadsheets/d/${MY_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName};
        
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substr(47).slice(0, -2));
            qArray = json.table.rows.slice(1).map(r => ({
                q: r.c[0]?.v,
                o: [r.c[1]?.v, r.c[2]?.v, r.c[3]?.v, r.c[4]?.v],
                a: parseInt(r.c[5]?.v) - 1
            }));
            
            document.getElementById('loader-overlay').style.display = 'none';
            document.getElementById('quiz-window').style.display = 'block';
            runTimer();
            renderQ();
        } catch(e) { 
            alert("Error: कृपया शीट को 'Publish to Web' करें!"); 
            location.reload();
        }
    }

    function runTimer() {
        let sec = 600;
        quizTimer = setInterval(() => {
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            document.getElementById('timer').innerText = ${m}:${s < 10 ? '0' : ''}${s};
            if (sec <= 0) finishQuiz();
            sec--;
        }, 1000);
    }

    function renderQ() {
        const data = qArray[currentIdx];
        document.getElementById('progress').innerText = Q: ${currentIdx + 1}/${qArray.length};
        document.getElementById('quiz-question').innerText = data.q;
        const box = document.getElementById('options-box');
        box.innerHTML = '';
        
        data.o.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => validate(b, i);
            box.appendChild(b);
        });
    }

    function validate(btn, selected) {
        const correct = qArray[currentIdx].a;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(x => x.disabled = true);

        if(selected === correct) {
            btn.classList.add('correct');
            cCount++;
            document.getElementById('correct-count').innerText = cCount;
        } else {
            btn.classList.add('wrong');
            btns[correct].classList.add('correct');
            wCount++;
            document.getElementById('wrong-count').innerText = wCount;
        }

        setTimeout(() => {
            currentIdx++;
            if(currentIdx < qArray.length) renderQ();
            else finishQuiz();
        }, 1200);
    }

    function finishQuiz() {
        clearInterval(quizTimer);
        document.getElementById('quiz-question').innerText = फाइनल स्कोर: ${cCount}/${qArray.length};
        document.getElementById('options-box').innerHTML = '';
        document.getElementById('result-box').style.display = 'block';
    }
</script>
</body>
</html>
