<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Class 10 Quiz - SHIVARAAV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #FFD700; }
        body { 
            background-image: url('1000061464.jpg'); background-size: cover; background-attachment: fixed; 
            color: white; text-align: center; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
        }
        /* QUIZ OVERLAY */
        #quiz-window { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 10, 20, 0.98); z-index: 9999; display: none; overflow-y: auto; padding: 20px; }
        .quiz-card { max-width: 700px; margin: 40px auto; background: rgba(255,255,255,0.05); border: 2px solid var(--gold); border-radius: 20px; padding: 30px; backdrop-filter: blur(15px); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .quiz-stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; color: var(--gold); border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: transparent; color: white; border: 1px solid var(--gold); border-radius: 10px; cursor: pointer; text-align: left; font-size: 1.1rem; }
        .correct { background-color: #28a745 !important; border-color: #28a745 !important; }
        .wrong { background-color: #dc3545 !important; border-color: #dc3545 !important; }
        
        /* PAGE STYLES */
        .header-section { padding: 30px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,215,0,0.2); }
        .subject-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: rgba(0, 15, 25, 0.8); border-radius: 12px; border: 1px solid rgba(255, 215, 0, 0.3); overflow: hidden; }
        .card-header { background: linear-gradient(45deg, #003366, #004080); color: var(--gold); padding: 12px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,215,0,0.1); text-align: left; font-size: 14px; }
        .btn-start { cursor: pointer; background: var(--gold); color: black; padding: 6px 18px; border-radius: 15px; font-weight: bold; border: none; }
    </style>
</head>
<body>

<div id="quiz-window">
    <div class="quiz-card">
        <div class="quiz-stats">
            <span><i class="fas fa-clock"></i> <span id="timer">10:00</span></span>
            <span id="progress">सवाल: 0/0</span>
            <span><i class="fas fa-check-circle"></i> <span id="correct-s">0</span> | <i class="fas fa-times-circle"></i> <span id="wrong-s">0</span></span>
        </div>
        <h3 id="question-area" style="min-height: 80px;">सवाल लोड हो रहा है...</h3>
        <div id="options-area"></div>
        <div id="result-box" style="display:none; margin-top: 20px;">
            <h2 style="color:var(--gold)">टेस्ट पूरा हुआ!</h2>
            <button onclick="location.reload()" class="btn-start" style="padding:10px 30px; font-size: 18px;">वापस जाएँ</button>
        </div>
    </div>
</div>

<div class="header-section">
    <img src="1000061253.webp" style="height: 80px;">
    <h1 style="color:var(--gold); font-weight: 800;">SHIVARAAV EDUCATION</h1>
</div>

<div class="subject-grid">
    <div class="card"><div class="card-header">SCIENCE (QUIZ)</div>
        <table>
            <tr><td>Physics Chapter 1</td><td align="right"><button onclick="startQuizNow('cbse_10_physics_ch1')" class="btn-start">Start</button></td></tr>
            <tr><td>Physics Chapter 2</td><td align="right"><button onclick="startQuizNow('cbse_10_physics_ch2')" class="btn-start">Start</button></td></tr>
        </table>
    </div>

    <div class="card"><div class="card-header">MATHEMATICS</div>
        <table>
            <tr><td>Chapter 1: Quiz</td><td align="right"><button onclick="startQuizNow('cbse_10_math_ch1')" class="btn-start">Start</button></td></tr>
        </table>
    </div>

    <div class="card"><div class="card-header">SST (HISTORY)</div>
        <table>
            <tr><td>History Chapter 1</td><td align="right"><button onclick="startQuizNow('cbse_10_sst_his1')" class="btn-start">Start</button></td></tr>
        </table>
    </div>
    </div>

<script>
    // --- यहाँ अपनी Google Sheet ID डालें ---
    const GOOGLE_SHEET_ID = '1Wo4kZzOhXWszWn3Qq-65VqAe1UDi_j4f6SbrPk4Ueo0';
    
    let quizQuestions = [], currentQ = 0, scoreCorrect = 0, scoreWrong = 0, countdown;

    async function startQuizNow(sheetTabName) {
        // स्क्रीन को साफ़ करें और क्विज़ दिखाएँ
        document.getElementById('quiz-window').style.display = 'block';
        document.getElementById('question-area').innerText = "डेटा लोड हो रहा है, कृपया रुकें...";
        
        // Google Sheet से डेटा लाने का असली लिंक
        const url = https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetTabName};
        
        try {
            const response = await fetch(url);
            const rawText = await response.text();
            // Google के फालतू टेक्स्ट को हटाकर सिर्फ काम का JSON निकालना
            const jsonData = JSON.parse(rawText.substring(47).slice(0, -2));
            
            quizQuestions = jsonData.table.rows.slice(1).map(row => ({
                q: row.c[0]?.v,
                options: [row.c[1]?.v, row.c[2]?.v, row.c[3]?.v, row.c[4]?.v],
                correct: parseInt(row.c[5]?.v) - 1
            }));

            if(quizQuestions.length > 0) {
                initTimer();
                showNextQuestion();
            } else {
                alert("इस चैप्टर में कोई सवाल नहीं मिले!");
            }
        } catch (error) {
            alert("Error: डेटा लोड नहीं हुआ। क्या आपकी शीट Public है? टैब का नाम सही है?");
            console.error(error);
        }
    }

    function initTimer() {
        let timeLeft = 600; // 10 मिनट
        countdown = setInterval(() => {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('timer').innerText = ${m}:${s < 10 ? '0' : ''}${s};
            if(timeLeft <= 0) finalize();
            timeLeft--;
        }, 1000);
    }

    function showNextQuestion() {
        const data = quizQuestions[currentQ];
        document.getElementById('progress').innerText = सवाल: ${currentQ + 1}/${quizQuestions.length};
        document.getElementById('question-area').innerText = data.q;
        
        const optBox = document.getElementById('options-area');
        optBox.innerHTML = '';
        
        data.options.forEach((opt, index) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => checkMyAnswer(b, index);
            optBox.appendChild(b);
        });
    }

    function checkMyAnswer(btn, clickedIndex) {
        const correctIndex = quizQuestions[currentQ].correct;
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if(clickedIndex === correctIndex) {
            btn.classList.add('correct');
            scoreCorrect++;
            document.getElementById('correct-s').innerText = scoreCorrect;
        } else {
            btn.classList.add('wrong');
            allBtns[correctIndex].classList.add('correct');
            scoreWrong++;
            document.getElementById('wrong-s').innerText = scoreWrong;
        }

        setTimeout(() => {
            currentQ++;
            if(currentQ < quizQuestions.length) showNextQuestion();
            else finalize();
        }, 1200);
    }

    function finalize() {
        clearInterval(countdown);
        document.getElementById('question-area').innerText = आपका स्कोर: ${scoreCorrect}/${quizQuestions.length};
        document.getElementById('options-area').innerHTML = '';
        document.getElementById('result-box').style.display = 'block';
    }
</script>
</body>
</html>
